<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1 id="title">Hello</h1>
    <button onclick="change()">Change</button>

    <script>
      function change() {
        document.getElementById('title').innerText = 'Hello React';
      }
    </script>
  </body>
</html>
